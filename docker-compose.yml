services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: portfolio-laravel-app:${TAG:-latest}
    pull_policy: build
    restart: unless-stopped
    # Без env_file: Docker заливает APP_KEY в env при create; Laravel не перебивает getenv пустым из файла после правок .env
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      - ./.env:/var/www/html/.env
      - portfolio_public:/var/www/html/public
      - portfolio_storage:/var/www/html/storage
      - portfolio_database:/var/www/html/database
    healthcheck:
      test: ["CMD-SHELL", "php -r 'if(!@fsockopen(\"127.0.0.1\",9000))exit(1);'"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: portfolio-laravel-web:${TAG:-latest}
    pull_policy: build
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certbot-www:/var/www/certbot:rw
      - portfolio_public:/var/www/html/public:ro
      - portfolio_storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  portfolio_public:
  portfolio_storage:
  portfolio_database:
